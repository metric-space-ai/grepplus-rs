<svg viewBox="0 0 900 452" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">What a coding agent saves with grepplus</title>
  <desc id="desc">A coding agent using plain grep answers a code question by looping — grep, read, grep, read, guessing the vocabulary over many rounds. An agent using grepplus asks the graph directly with two commands. Median across 94 code-question tasks: about 3.7x fewer billed input tokens, 2.9x fewer output tokens, 2x faster, and 4x fewer tool-call rounds.</desc>
  <rect width="900" height="452" fill="#ffffff"/>

  <text x="34" y="40" font-size="21" font-weight="700" fill="#0f172a">Same code question — far fewer model round-trips</text>
  <text x="34" y="62" font-size="12.5" fill="#64748b">e.g. “who calls this function?” or “where is the code that does X?” — plain grep vs. grepplus</text>

  <!-- column headers -->
  <text x="34" y="92" font-size="13" font-weight="700" fill="#b91c1c">Agent using grep <tspan font-weight="400" font-size="11" fill="#9ca3af">— guesses, loops</tspan></text>
  <text x="466" y="92" font-size="13" font-weight="700" fill="#15803d">Agent using grepplus <tspan font-weight="400" font-size="11" fill="#9ca3af">— asks directly</tspan></text>

  <!-- LEFT: guessing loop -->
  <g font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#991b1b">
    <rect x="34" y="102" width="398" height="24" rx="5" fill="#fef2f2" stroke="#fecaca"/><text x="46" y="118">grep -rn "ancestor" … · read file</text>
    <rect x="34" y="131" width="398" height="24" rx="5" fill="#fef2f2" stroke="#fecaca"/><text x="46" y="147">grep -rn "split.*'\.'" … · read file</text>
    <rect x="34" y="160" width="398" height="24" rx="5" fill="#fef2f2" stroke="#fecaca"/><text x="46" y="176">grep -rEn "def \w*(name|nest|prefix)" …</text>
    <rect x="34" y="189" width="398" height="24" rx="5" fill="#fee2e2" stroke="#fecaca" stroke-dasharray="4 4"/><text x="46" y="205" font-family="-apple-system" fill="#b91c1c">… and many more rounds of guess-grep + read</text>
  </g>

  <!-- RIGHT: two commands -->
  <g font-family="ui-monospace,Menlo,monospace" font-size="10.5" fill="#166534">
    <rect x="466" y="102" width="400" height="38" rx="5" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="478" y="118">grep context "expand a dotted nesting</text>
    <text x="478" y="132">  name into ancestor prefixes"</text>
    <rect x="466" y="146" width="400" height="38" rx="5" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="478" y="162">grep brief _split_blueprint_path</text>
    <text x="478" y="176" font-family="-apple-system" font-size="9.5" fill="#15803d">→ definition + callers + callees</text>
    <text x="478" y="207" font-family="-apple-system" font-size="11" font-weight="600" fill="#16a34a">→ answered. same correct result, no guessing.</text>
  </g>

  <!-- median stats — the only numbers, identical to the README table -->
  <rect x="34" y="232" width="832" height="118" rx="12" fill="#0f172a"/>
  <text x="52" y="260" font-size="12.5" font-weight="600" fill="#e5e7eb">What grepplus saves — median across 94 code-question tasks (4 real repos, MiniMax-M3):</text>
  <g text-anchor="middle">
    <text x="150" y="305" font-size="30" font-weight="800" fill="#ffffff">~3.7×</text>
    <text x="358" y="305" font-size="30" font-weight="800" fill="#ffffff">~2.9×</text>
    <text x="566" y="305" font-size="30" font-weight="800" fill="#ffffff">~2.0×</text>
    <text x="758" y="305" font-size="30" font-weight="800" fill="#ffffff">~4.0×</text>
  </g>
  <g text-anchor="middle" font-size="11.5" fill="#94a3b8">
    <text x="150" y="328">fewer input tokens</text>
    <text x="358" y="328">fewer output tokens</text>
    <text x="566" y="328">faster</text>
    <text x="758" y="328">fewer tool-call rounds</text>
  </g>

  <!-- footnote (matches the README prose) -->
  <text x="34" y="378" font-size="11" fill="#64748b">The win is largest on structural and vocabulary-gap questions like this one, and ~1× on a plain literal search, where grep is already</text>
  <text x="34" y="394" font-size="11" fill="#64748b">the right tool. The fixed system prompt is warmup and is excluded from every ratio.</text>
</svg>
