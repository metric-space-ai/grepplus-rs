<svg viewBox="0 0 960 616" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">The full tool chain — an agent using grep vs an agent using greppy on task r047</title>
  <desc id="desc">The complete run. Using plain grep, the agent makes 33 tool calls — guessing regexes for the vocabulary for 30 rounds before finding the function. Using greppy it makes 2 calls: one semantic query and one briefing. On this task that is about 35x fewer billed input tokens, 7.5x fewer output tokens and 8.7x faster. The benchmark median across 94 tasks is about 3.7x fewer input tokens, 2.9x fewer output tokens, 2x faster and 4x fewer rounds.</desc>
  <rect width="960" height="616" fill="#ffffff"/>

  <text x="34" y="30" font-size="19" font-weight="700" fill="#0f172a">The full tool chain — agent using grep vs agent using greppy (task r047)</text>
  <text x="34" y="50" font-size="12" fill="#64748b">“Which routine expands a dotted nesting name into all of its ancestor prefixes?” · Flask · MiniMax-M3 · both find <tspan font-family="ui-monospace,Menlo,monospace">_split_blueprint_path</tspan></text>

  <!-- headers -->
  <text x="34" y="76" font-size="12.5" font-weight="700" fill="#b91c1c">Agent using grep — 33 calls, guessing the vocabulary</text>
  <text x="512" y="76" font-size="12.5" font-weight="700" fill="#15803d">Agent using greppy — 2 calls</text>

  <!-- LEFT: the complete 33-call chain -->
  <rect x="34" y="84" width="454" height="500" rx="8" fill="#fef2f2" stroke="#fecaca"/>
  <g font-family="ui-monospace,Menlo,monospace" font-size="8.5" fill="#991b1b">
    <text x="46" y="98">1  ls</text>
    <text x="46" y="112">2  grep -rn "ancestor" --include=*.py . | head -50</text>
    <text x="46" y="126">3  grep -rn "split.*'\.'" --include=*.py . | head -20</text>
    <text x="46" y="140">4  grep -rEn "def \w+_?(name|nest|prefix|split)" *.py</text>
    <text x="46" y="154">5  grep -rEn "def \w*" ./src/flask/sansio/ | head -60</text>
    <text x="46" y="168">6  read src/flask/sansio/blueprints.py:256</text>
    <text x="46" y="182">7  grep -rEn "(rsplit|split).*'\.'|\.split('\.')" .</text>
    <text x="46" y="196">8  grep -rEn "def _?\w*(name|nest|prefix|parent|dot)" .</text>
    <text x="46" y="210">9  read src/flask/config.py:300</text>
    <text x="46" y="224">10 read tests/test_blueprints.py:995</text>
    <text x="46" y="238">11 grep -rEn "for \w+ in \w+\.split('\.')" ./src/flask</text>
    <text x="46" y="252">12 grep -rEn "\.rsplit('\.'|ancestor|dotted_name" ./src</text>
    <text x="46" y="266">13 grep -rEn "expand|prefix" ./src/flask | head -40</text>
    <text x="46" y="280">14 grep -rEn "\.join(.*split('\.')" ./src/flask</text>
    <text x="46" y="294">15 grep -rEn "range(.*len(.*split" ./src/flask | head</text>
    <text x="46" y="308">16 grep -rEn "[:-1]\.join|join.*split" ./src/flask</text>
    <text x="46" y="322">17 grep -rEn "\.rsplit('\.'" . | head -20</text>
    <text x="46" y="336">18 grep -rEn "def _?\w*(Prefix|Expand|Nest)" ./src</text>
    <text x="46" y="350">19 read src/flask/config.py:120</text>
    <text x="46" y="364">20 grep -rEn "for \w+ in.*split" ./src/flask | head -30</text>
    <text x="46" y="378">21 grep -rEn "\.split" ./src/flask | head -40</text>
    <text x="46" y="392">22 grep -rEn "def \w+|namespaces|expand" ./src | grep -i</text>
    <text x="46" y="406">23 grep -rEn "\.\s*join|split('\.'" ./src/flask | head</text>
    <text x="46" y="420">24 grep -rEn "split|prefix" .../scaffold.py | head -50</text>
    <text x="46" y="434">25 grep -rEn "def _?\w*" .../scaffold.py | head -30</text>
    <text x="46" y="448">26 grep -rEn "def _?\w*" .../scaffold.py | grep -iE …</text>
    <text x="46" y="462">27 read src/flask/sansio/scaffold.py:700</text>
    <text x="46" y="476">28 grep -rEn "def \w+" ./src/flask | head -100</text>
    <text x="46" y="490">29 grep -rEn "def \w+" ./src/flask | wc -l  (+ dump)</text>
    <text x="46" y="504" fill="#dc2626" font-weight="700">30 read src/flask/helpers.py:640     ← the answer</text>
    <text x="46" y="518" fill="#dc2626">31 grep -rn "_split_blueprint_path" ./src ./tests</text>
    <text x="46" y="532">32 read src/flask/sansio/app.py:960</text>
    <text x="46" y="546">33 read src/flask/wrappers.py:180</text>
    <text x="46" y="570" font-family="-apple-system" font-size="10.5" font-weight="700" fill="#7f1d1d">33 calls · 320,662 input tok · 2,772 output · 124.8 s</text>
  </g>

  <!-- RIGHT: two commands -->
  <g font-family="ui-monospace,Menlo,monospace" font-size="10.5" fill="#166534">
    <rect x="506" y="84" width="420" height="40" rx="6" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="518" y="101">1  grep context "expand a dotted nesting</text>
    <text x="518" y="115">     name into ancestor prefixes"</text>
    <rect x="506" y="130" width="420" height="40" rx="6" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="518" y="147">2  grep brief _split_blueprint_path</text>
    <text x="518" y="161" font-family="-apple-system" font-size="9.5" fill="#15803d">→ definition + callers + callees → done</text>
  </g>
  <text x="506" y="192" font-family="-apple-system" font-size="10.5" font-weight="700" fill="#14532d">2 calls · 9,238 input tok · 371 output · 14.3 s</text>

  <!-- gains on THIS task (the cherry-pick) -->
  <rect x="506" y="206" width="420" height="118" rx="10" fill="#0f172a"/>
  <text x="524" y="230" font-size="11.5" font-weight="600" fill="#e5e7eb">What greppy saved on this task:</text>
  <g text-anchor="middle">
    <text x="576" y="278" font-size="30" font-weight="800" fill="#ffffff">35×</text>
    <text x="716" y="278" font-size="30" font-weight="800" fill="#ffffff">7.5×</text>
    <text x="856" y="278" font-size="30" font-weight="800" fill="#ffffff">8.7×</text>
  </g>
  <g text-anchor="middle" font-size="10.5" fill="#94a3b8">
    <text x="576" y="300">fewer input tokens</text>
    <text x="716" y="300">fewer output</text>
    <text x="856" y="300">faster</text>
  </g>

  <!-- footnote: the statistical median -->
  <text x="506" y="352" font-size="11" fill="#64748b">This is one task, chosen to show the mechanism. <tspan font-weight="700" fill="#334155">Across all 94</tspan></text>
  <text x="506" y="368" font-size="11" fill="#64748b"><tspan font-weight="700" fill="#334155">benchmark tasks the median is ~3.7× fewer input</tspan></text>
  <text x="506" y="384" font-size="11" fill="#64748b"><tspan font-weight="700" fill="#334155">tokens, ~2.9× fewer output, ~2× faster, ~4× rounds.</tspan></text>
  <text x="506" y="404" font-size="10.5" fill="#94a3b8">Largest on structural / vocabulary-gap questions; ~1× on a</text>
  <text x="506" y="418" font-size="10.5" fill="#94a3b8">plain literal search. System prompt excluded from every ratio.</text>
</svg>
